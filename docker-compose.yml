services:
  backend:
    build:
      context: ./backend
    container_name: video-compressor-backend
    environment:
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
      MAX_FILE_SIZE_MB: 1000
      UPLOAD_DIR: src/uploads
      COMPRESSED_DIR: src/compressed
      FILE_TTL_MINUTES: 60
      RATE_LIMIT_WINDOW_MINUTES: 15
      RATE_LIMIT_MAX: 60
    ports:
      - "4000:4000"
    volumes:
      - backend_uploads:/app/src/uploads
      - backend_compressed:/app/src/compressed
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: video-compressor-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_compressed:

